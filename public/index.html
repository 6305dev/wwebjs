<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-card: rgba(255, 255, 255, 0.04);
        --bg-card-hover: rgba(255, 255, 255, 0.07);
        --border: rgba(255, 255, 255, 0.08);
        --text-primary: #f0f0f5;
        --text-secondary: #8888a0;
        --text-muted: #555570;
        --accent: #25d366;
        --accent-glow: rgba(37, 211, 102, 0.25);
        --warning: #f5a623;
        --warning-glow: rgba(245, 166, 35, 0.25);
        --danger: #ef4444;
        --danger-glow: rgba(239, 68, 68, 0.25);
        --info: #3b82f6;
        --info-glow: rgba(59, 130, 246, 0.25);
        --radius: 16px;
        --radius-sm: 10px;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Background effects */
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            circle at 30% 20%,
            rgba(37, 211, 102, 0.04) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 70% 80%,
            rgba(59, 130, 246, 0.03) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 24px;
        position: relative;
        z-index: 1;
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 48px;
      }

      .header-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--accent), #128c7e);
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin-bottom: 20px;
        box-shadow: 0 8px 32px var(--accent-glow);
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(
          135deg,
          var(--text-primary) 0%,
          var(--text-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      .header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
      }

      /* Status Badge */
      .status-section {
        display: flex;
        justify-content: center;
        margin-bottom: 40px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 24px;
        border-radius: 100px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        backdrop-filter: blur(20px);
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        position: relative;
      }

      .status-dot::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        animation: pulse-ring 2s ease-out infinite;
      }

      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0 currentColor;
          opacity: 0.6;
        }
        100% {
          box-shadow: 0 0 0 8px currentColor;
          opacity: 0;
        }
      }

      .status-badge[data-status="initializing"] {
        border-color: rgba(59, 130, 246, 0.3);
      }
      .status-badge[data-status="initializing"] .status-dot {
        background: var(--info);
        color: var(--info);
      }
      .status-badge[data-status="initializing"] .status-text {
        color: var(--info);
      }

      .status-badge[data-status="qr"] {
        border-color: rgba(245, 166, 35, 0.3);
      }
      .status-badge[data-status="qr"] .status-dot {
        background: var(--warning);
        color: var(--warning);
      }
      .status-badge[data-status="qr"] .status-text {
        color: var(--warning);
      }

      .status-badge[data-status="authenticated"] {
        border-color: rgba(59, 130, 246, 0.3);
      }
      .status-badge[data-status="authenticated"] .status-dot {
        background: var(--info);
        color: var(--info);
      }
      .status-badge[data-status="authenticated"] .status-text {
        color: var(--info);
      }

      .status-badge[data-status="ready"] {
        border-color: rgba(37, 211, 102, 0.3);
      }
      .status-badge[data-status="ready"] .status-dot {
        background: var(--accent);
        color: var(--accent);
      }
      .status-badge[data-status="ready"] .status-text {
        color: var(--accent);
      }

      .status-badge[data-status="disconnected"],
      .status-badge[data-status="auth_failure"] {
        border-color: rgba(239, 68, 68, 0.3);
      }
      .status-badge[data-status="disconnected"] .status-dot,
      .status-badge[data-status="auth_failure"] .status-dot {
        background: var(--danger);
        color: var(--danger);
      }
      .status-badge[data-status="disconnected"] .status-text,
      .status-badge[data-status="auth_failure"] .status-text {
        color: var(--danger);
      }

      /* Main Grid */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      /* Card */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 32px;
        backdrop-filter: blur(20px);
        transition: all 0.3s ease;
      }

      .card:hover {
        background: var(--bg-card-hover);
        border-color: rgba(255, 255, 255, 0.12);
      }

      .card-title {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-title .icon {
        font-size: 1rem;
      }

      /* QR Section */
      .qr-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 280px;
      }

      #qr-image {
        width: 240px;
        height: 240px;
        border-radius: var(--radius-sm);
        display: none;
        animation: fadeScale 0.4s ease;
      }

      @keyframes fadeScale {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .qr-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
      }

      .qr-placeholder .icon {
        font-size: 3rem;
        opacity: 0.5;
      }

      .qr-placeholder p {
        font-size: 0.85rem;
        text-align: center;
      }

      .connected-message {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        animation: fadeScale 0.4s ease;
      }

      .connected-message .checkmark {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--accent), #128c7e);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 8px 32px var(--accent-glow);
      }

      .connected-message p {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--accent);
      }

      /* Log */
      .log-container {
        display: flex;
        flex-direction: column;
        min-height: 280px;
      }

      .log-list {
        flex: 1;
        overflow-y: auto;
        max-height: 320px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-right: 4px;
      }

      .log-list::-webkit-scrollbar {
        width: 4px;
      }

      .log-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .log-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .log-entry {
        display: flex;
        gap: 10px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.02);
        font-size: 0.8rem;
        animation: slideIn 0.3s ease;
        align-items: flex-start;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .log-time {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 0.72rem;
        white-space: nowrap;
        padding-top: 1px;
      }

      .log-msg {
        color: var(--text-secondary);
        line-height: 1.4;
      }
      .log-entry.info .log-msg {
        color: var(--info);
      }
      .log-entry.success .log-msg {
        color: var(--accent);
      }
      .log-entry.warning .log-msg {
        color: var(--warning);
      }
      .log-entry.error .log-msg {
        color: var(--danger);
      }

      /* API Info Card */
      .api-card {
        grid-column: 1 / -1;
      }

      .api-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 700px) {
        .api-info {
          grid-template-columns: 1fr;
        }
      }

      .api-item {
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }

      .api-item-label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .api-item-value {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 0.82rem;
        color: var(--text-primary);
        word-break: break-all;
      }

      .api-item-value .method {
        display: inline-block;
        background: rgba(37, 211, 102, 0.15);
        color: var(--accent);
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.72rem;
        margin-right: 6px;
      }

      .api-item-value .header-key {
        color: var(--warning);
      }

      pre.code-block {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 0.78rem;
        color: var(--text-secondary);
        overflow-x: auto;
        line-height: 1.6;
        margin-top: 16px;
      }

      pre.code-block .key {
        color: var(--info);
      }
      pre.code-block .string {
        color: var(--accent);
      }
      pre.code-block .comment {
        color: var(--text-muted);
      }

      /* Empty log state */
      .log-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 8px;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .log-empty .icon {
        font-size: 1.5rem;
        opacity: 0.4;
      }

      /* Spinner */
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--info);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const statusBadge = document.getElementById("status-badge");
      const statusText = document.getElementById("status-text");
      const qrImage = document.getElementById("qr-image");
      const qrPlaceholder = document.getElementById("qr-placeholder");
      const connectedMsg = document.getElementById("connected-msg");
      const logList = document.getElementById("log-list");
      const logEmpty = document.getElementById("log-empty");

      const STATUS_LABELS = {
        initializing: "Menginisialisasi...",
        qr: "Menunggu Scan QR",
        authenticated: "Terautentikasi",
        ready: "Terhubung & Siap",
        disconnected: "Terputus",
        auth_failure: "Autentikasi Gagal",
      };

      const STATUS_LOG_TYPE = {
        initializing: "info",
        qr: "warning",
        authenticated: "info",
        ready: "success",
        disconnected: "error",
        auth_failure: "error",
      };

      function addLog(message, type = "info") {
        if (logEmpty) logEmpty.style.display = "none";

        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;

        const now = new Date();
        const time = now.toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });

        entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-msg">${message}</span>
      `;

        logList.appendChild(entry);
        logList.scrollTop = logList.scrollHeight;

        // Keep max 50 entries
        while (logList.children.length > 51) {
          logList.removeChild(logList.children[1]);
        }
      }

      function updateQrDisplay(status, qrDataUrl) {
        qrPlaceholder.style.display = "none";
        qrImage.style.display = "none";
        connectedMsg.style.display = "none";

        if (status === "qr" && qrDataUrl) {
          qrImage.src = qrDataUrl;
          qrImage.style.display = "block";
        } else if (status === "ready") {
          connectedMsg.style.display = "flex";
        } else if (status === "initializing") {
          qrPlaceholder.style.display = "flex";
        } else if (status === "disconnected" || status === "auth_failure") {
          qrPlaceholder.innerHTML = `
          <span style="font-size:3rem; opacity:0.5;">⚠️</span>
          <p>${status === "auth_failure" ? "Autentikasi gagal" : "Koneksi terputus"}</p>
          <p style="font-size:0.75rem; color:var(--text-muted);">Menghubungkan kembali...</p>
        `;
          qrPlaceholder.style.display = "flex";
        } else if (status === "authenticated") {
          qrPlaceholder.innerHTML = `
          <div class="spinner"></div>
          <p>Memuat WhatsApp...</p>
        `;
          qrPlaceholder.style.display = "flex";
        }
      }

      // Socket events
      socket.on("status", (data) => {
        const { status, qr, reason, message } = data;

        statusBadge.setAttribute("data-status", status);
        statusText.textContent = STATUS_LABELS[status] || status;

        updateQrDisplay(status, qr);

        let logMsg = STATUS_LABELS[status] || status;
        if (reason) logMsg += ` — ${reason}`;
        if (message) logMsg += ` — ${message}`;
        addLog(logMsg, STATUS_LOG_TYPE[status] || "info");
      });

      socket.on("message_sent", (data) => {
        addLog(
          `📤 Pesan terkirim ke ${data.number}: "${data.message}"`,
          "success",
        );
      });

      socket.on("connect", () => {
        addLog("Terhubung ke server", "info");
      });

      socket.on("disconnect", () => {
        addLog("Terputus dari server", "error");
      });
    </script>
